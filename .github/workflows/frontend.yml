name: Frontend CI

on:
  push:
    branches: [ master, main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

  pull_request:
    branches: [ master, main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]   # 🔥 IMPORTANT: single version only

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Clean Install Dependencies (fix rolldown)
        run: npm install --legacy-peer-deps --include=optional
        working-directory: frontend

      - name: Verify install
        run: npm ls
        working-directory: frontend

      - name: Build Vite App
        run: npm run build
        working-directory: frontend

      - name: Run Tests
        run: npm run test
        working-directory: frontend